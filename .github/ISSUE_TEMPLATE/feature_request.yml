name: Product feature request
description: Suggest an improvement to the released Rion Studio product.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Explain the user problem this request would solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested behavior
    validations:
      required: true
